name: StockPro
options:
  bundleIdPrefix: com.bibliothequebadr
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: 1
    INFOPLIST_FILE: StockPro/Info.plist
    DEVELOPMENT_TEAM: "85CFG39VKQ"
    MARKETING_VERSION: "0.8"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_PREVIEWS: YES

targets:
  StockPro:
    type: application
    platform: iOS
    sources:
      - StockPro/App
      - StockPro/Data
      - StockPro/DesignSystem
      - StockPro/Networking
      - StockPro/Security
      - StockPro/Services
      - StockPro/Utilities
      - StockPro/ViewModels
      - StockPro/Views
      - StockPro/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bibliothequebadr.stockpro
        INFOPLIST_FILE: StockPro/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
    dependencies: []
    preBuildScripts:
      - name: SwiftGen
        script: |
          if [ -f /opt/homebrew/bin/swiftgen ]; then
            /opt/homebrew/bin/swiftgen
          fi
        basedOnDependencyAnalysis: false
  StockProTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - StockProTests
    dependencies:
      - target: StockPro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bibliothequebadr.stockpro.tests
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
