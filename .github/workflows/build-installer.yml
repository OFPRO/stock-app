name: Build Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          echo "ISCC_PATH=C:\Program Files (x86)\Inno Setup 6\ISCC.exe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller bundle
        run: pyinstaller build/pyinstaller.spec --distpath dist --workpath build/_tmp

      - name: Build Inno Setup installer
        run: |
          & "$env:ISCC_PATH" build/installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockPro-Setup
          path: dist/StockPro-Setup.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/StockPro-Setup.exe
          generate_release_notes: true
