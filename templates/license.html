<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPro - Licence</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .license-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 520px;
            max-width: 95vw;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .license-card h1 {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }
        .license-card .subtitle {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 24px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .status-badge.success { background: #e8f5e9; color: #2e7d32; }
        .status-badge.error { background: #fbe9e7; color: #c62828; }
        .status-badge.warning { background: #fff8e1; color: #f57f17; }
        .status-badge.info { background: #e3f2fd; color: #1565c0; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-row .label { color: #888; }
        .info-row .value { font-weight: 500; font-family: monospace; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .form-group input[readonly] {
            background: #f9f9f9;
            color: #666;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #4f46e5; color: white; width: 100%; }
        .btn-primary:hover:not(:disabled) { opacity: 0.9; }
        .btn-success { background: #2e7d32; color: white; }
        .btn-outline {
            background: transparent;
            border: 2px solid #ddd;
            color: #444;
            width: 100%;
        }
        .btn-outline:hover { border-color: #4f46e5; color: #4f46e5; }
        .token-box {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.75rem;
            word-break: break-all;
            max-height: 160px;
            overflow-y: auto;
            margin-top: 8px;
        }
        .copy-btn {
            position: relative;
            float: right;
            margin-top: 8px;
            padding: 4px 12px;
            font-size: 0.75rem;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .alert-error { background: #fbe9e7; color: #c62828; border-left: 4px solid #c62828; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        .alert-info { background: #e3f2fd; color: #1565c0; border-left: 4px solid #1565c0; }
        .action-row { display: flex; gap: 8px; margin-top: 8px; }
        .mac-display { font-family: monospace; font-weight: 700; font-size: 1.1rem; letter-spacing: 1px; color: #4f46e5; }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #4f46e5;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover { text-decoration: underline; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="license-card">
        <h1><i class="fas fa-key"></i> Licence StockPro</h1>
        <p class="subtitle" id="subtitle">Chargement...</p>

        <div id="statusArea"></div>
        <div id="contentArea" style="display:none;"></div>

        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Retour au tableau de bord</a>
    </div>

    <script>
    async function loadStatus() {
        const statusArea = document.getElementById('statusArea');
        const contentArea = document.getElementById('contentArea');
        const subtitle = document.getElementById('subtitle');

        try {
            const res = await fetch('/api/license/status');
            const data = await res.json();

            if (data.admin) {
                subtitle.textContent = 'Mode administrateur — génération de licences';
                statusArea.innerHTML = `<div class="status-badge info"><i class="fas fa-laptop"></i> Poste développeur (macOS)</div>`;
                contentArea.style.display = 'block';
                renderAdminPanel(data);
            } else if (data.activated) {
                subtitle.textContent = 'Licence active';
                statusArea.innerHTML = `<div class="status-badge success"><i class="fas fa-check-circle"></i> Licence valide</div>`;
                contentArea.style.display = 'block';
                renderActivated(data);
            } else if (data.error) {
                subtitle.textContent = 'Licence non activée';
                statusArea.innerHTML = `<div class="status-badge error"><i class="fas fa-times-circle"></i> ${data.error}</div>`;
                contentArea.style.display = 'block';
                renderActivationForm(data.mac);
            } else {
                subtitle.textContent = 'Activation requise';
                statusArea.innerHTML = `<div class="status-badge warning"><i class="fas fa-clock"></i> Licence non activée</div>`;
                contentArea.style.display = 'block';
                renderActivationForm(data.mac);
            }
        } catch (e) {
            statusArea.innerHTML = `<div class="alert alert-error">Erreur de chargement du statut</div>`;
        }
    }

    function renderAdminPanel(data) {
        const html = `
            <div class="form-group">
                <label><i class="fas fa-network-wired"></i> Adresse MAC</label>
                <input type="text" id="adminMac" value="${data.mac || ''}" placeholder="XX:XX:XX:XX:XX:XX">
                <button class="btn btn-outline" style="margin-top:6px;font-size:0.8rem;padding:6px;" onclick="detectMac()">
                    <i class="fas fa-sync"></i> Détecter ma MAC
                </button>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nom du client</label>
                <input type="text" id="adminClient" placeholder="Ex: Librairie Badr">
            </div>
            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Durée (jours)</label>
                <input type="number" id="adminDays" value="365" min="1">
            </div>
            <button class="btn btn-primary" onclick="generateToken()">
                <i class="fas fa-key"></i> Générer le token
            </button>
            <div id="tokenOutput" style="display:none;margin-top:16px;">
                <label style="font-size:0.85rem;font-weight:600;color:#444;">Token généré</label>
                <div class="token-box" id="tokenText"></div>
                <div class="action-row">
                    <button class="btn btn-success copy-btn" onclick="copyToken()"><i class="fas fa-copy"></i> Copier</button>
                    <button class="btn btn-outline copy-btn" onclick="downloadToken()"><i class="fas fa-download"></i> Télécharger</button>
                </div>
            </div>
            <div id="tokenError" style="display:none;margin-top:12px;" class="alert alert-error"></div>
        `;
        contentArea.innerHTML = html;
    }

    function renderActivated(data) {
        const expDate = data.expires_at ? new Date(data.expires_at * 1000).toLocaleDateString('fr-FR') : 'N/A';
        const html = `
            <div class="info-row">
                <span class="label">Client</span>
                <span class="value">${data.client || 'N/A'}</span>
            </div>
            <div class="info-row">
                <span class="label">Adresse MAC</span>
                <span class="value mac-display">${data.mac || 'N/A'}</span>
            </div>
            <div class="info-row">
                <span class="label">Expire le</span>
                <span class="value">${expDate}</span>
            </div>
        `;
        contentArea.innerHTML = html;
    }

    function renderActivationForm(mac) {
        const html = `
            <div class="alert alert-info">
                <i class="fas fa-info-circle"></i>
                Notez l'adresse MAC ci-dessous et envoyez-la à votre fournisseur pour obtenir votre clé de licence.
            </div>
            <div class="form-group">
                <label><i class="fas fa-network-wired"></i> Adresse MAC de cette machine</label>
                <input type="text" value="${mac || 'Détection en cours...'}" readonly>
            </div>
            <div class="form-group">
                <label><i class="fas fa-key"></i> Clé de licence</label>
                <input type="text" id="activateToken" placeholder="Collez votre token de licence ici">
            </div>
            <button class="btn btn-primary" onclick="activateLicense()">
                <i class="fas fa-check"></i> Activer
            </button>
            <div id="activationError" style="display:none;margin-top:12px;" class="alert alert-error"></div>
        `;
        contentArea.innerHTML = html;
    }

    async function detectMac() {
        try {
            const res = await fetch('/api/license/status');
            const data = await res.json();
            if (data.mac) {
                document.getElementById('adminMac').value = data.mac;
            }
        } catch (e) {}
    }

    async function generateToken() {
        const mac = document.getElementById('adminMac').value.trim();
        const client = document.getElementById('adminClient').value.trim();
        const days = parseInt(document.getElementById('adminDays').value) || 365;
        const errorDiv = document.getElementById('tokenError');
        const outputDiv = document.getElementById('tokenOutput');

        errorDiv.style.display = 'none';
        outputDiv.style.display = 'none';

        if (!mac) {
            errorDiv.textContent = 'Veuillez entrer une adresse MAC';
            errorDiv.style.display = 'block';
            return;
        }
        if (!client) {
            errorDiv.textContent = 'Veuillez entrer un nom de client';
            errorDiv.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('/api/license/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mac, client, days})
            });
            const data = await res.json();
            if (data.token) {
                document.getElementById('tokenText').textContent = data.token;
                outputDiv.style.display = 'block';
            } else {
                errorDiv.textContent = data.error || 'Erreur de génération';
                errorDiv.style.display = 'block';
            }
        } catch (e) {
            errorDiv.textContent = 'Erreur réseau';
            errorDiv.style.display = 'block';
        }
    }

    function copyToken() {
        const text = document.getElementById('tokenText').textContent;
        navigator.clipboard.writeText(text);
    }

    function downloadToken() {
        const text = document.getElementById('tokenText').textContent;
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'license-token.txt';
        a.click();
    }

    async function activateLicense() {
        const token = document.getElementById('activateToken').value.trim();
        const errorDiv = document.getElementById('activationError');
        errorDiv.style.display = 'none';

        if (!token) {
            errorDiv.textContent = 'Veuillez coller votre clé de licence';
            errorDiv.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('/api/license/activate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token})
            });
            const data = await res.json();
            if (data.ok) {
                window.location.href = '/';
            } else {
                errorDiv.textContent = data.error || 'Token invalide';
                errorDiv.style.display = 'block';
            }
        } catch (e) {
            errorDiv.textContent = 'Erreur réseau';
            errorDiv.style.display = 'block';
        }
    }

    loadStatus();
    </script>
</body>
</html>
